services:
  # ---------------------------------------------------------------------------
  # MySQL 8.x
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      # Restaurant timezone. Override with `TZ=America/...` in your shell or .env.
      # MUST match the backend service so absolute timestamps (NOW(), CURDATE(),
      # CURTIME()) align with the user's clock and the admin-set service hours.
      TZ: ${TZ:-America/Mexico_City}
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: restaurant_ordering
    ports:
      # Published on 3307 to avoid colliding with a native MySQL on the host's
      # 3306. The backend reaches this DB as db:3306 over the compose network,
      # so the internal port is unchanged; 3307 is only for host tools.
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # SQL files mounted to /sql/ (NOT initdb.d — to avoid double execution).
      # The init.sh script runs them in order via the mysql client,
      # which properly handles DELIMITER for stored procedures.
      - ./backend/database/schema.sql:/sql/01-schema.sql:ro
      - ./backend/database/stored_procedures.sql:/sql/02-stored_procedures.sql:ro
      - ./backend/database/seed.sql:/sql/03-seed.sql:ro
      - ./backend/database/init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for LOCAL DEV ONLY.
  # Stands in for AWS S3 so image uploads never touch a real AWS account.
  #   :9000 = S3 API (the backend talks to this)
  #   :9001 = web console (http://localhost:9001, login minioadmin/minioadmin)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ---------------------------------------------------------------------------
  # One-shot: wait for MinIO, create the dev bucket, make it publicly readable.
  # The bucket must allow anonymous downloads because uploaded images are
  # served straight to the browser via <img src> (the app sets no per-object
  # ACL). Exits 0 once done; safe to re-run (idempotent).
  # ---------------------------------------------------------------------------
  minio-setup:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...'; sleep 1;
      done &&
      mc mb --ignore-existing local/the-rollecito-dev &&
      mc anonymous set download local/the-rollecito-dev &&
      echo 'MinIO bucket the-rollecito-dev ready (public read).'
      "

  # ---------------------------------------------------------------------------
  # Backend (Node.js + Express)
  # ---------------------------------------------------------------------------
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./backend/.env:/app/.env:ro
      # Firebase Admin SDK credentials — referenced by GOOGLE_APPLICATION_CREDENTIALS
      # in backend/.env. Read-only mount; the file is gitignored at the project root.
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
      # Dev: bind-mount source so nodemon picks up file changes without a rebuild.
      - ./backend/src:/app/src
      - ./backend/database:/app/database:ro
    environment:
      # Restaurant timezone — must match the db service. Drives Node's `new Date()`
      # output and is forwarded to mysql2 so DATETIME literals are parsed
      # consistently. Override via shell env: `TZ=America/Tijuana docker compose up`.
      TZ: ${TZ:-America/Mexico_City}
      # DB connection (Docker-specific — overrides .env)
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: admin123
      DB_NAME: restaurant_ordering
      DB_CONNECTION_LIMIT: 10
      CORS_ORIGIN: http://localhost:5173
      # S3 → local MinIO. Inside the compose network MinIO is reachable as
      # `minio`, so override the .env value (which uses localhost for
      # bare-metal dev). S3_PUBLIC_URL_BASE stays localhost (from .env) so the
      # browser can load images via the published :9000 port.
      S3_ENDPOINT: http://minio:9000
      # Everything else (PORT, NODE_ENV, JWT, Firebase, Stripe, AWS_* creds,
      # S3_BUCKET, S3_PUBLIC_URL_BASE) is loaded from backend/.env mounted above.
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Frontend (Vite dev server)
  # Hot-reloads from the host bind-mount. Proxies /api and /socket.io
  # to the backend service over the Docker network.
  # ---------------------------------------------------------------------------
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      # Bind-mount ONLY source for HMR — we deliberately do NOT mount
      # /app or /app/node_modules from the host, so the image's native
      # linux binaries (rollup etc.) stay intact. When you change a
      # package.json dep, rerun `docker compose up --build`.
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      # .env is .dockerignored so it's never baked in — bind-mount the live
      # file so VITE_* changes are picked up after a container restart
      # (Vite reads .env at dev-server startup, not on file change).
      - ./frontend/.env:/app/.env:ro
    environment:
      VITE_PROXY_TARGET: http://backend:3001
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend

volumes:
  mysql_data:
  minio_data:
